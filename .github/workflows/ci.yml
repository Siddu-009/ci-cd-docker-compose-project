name: CI/CD Kubernetes Deployment

on:
  push:
    branches:
      - main

env:
  BACKEND_IMAGE: siddu009/automation-backend
  FRONTEND_IMAGE: siddu009/automation-frontend
  IMAGE_TAG: latest

jobs:
  deploy:

    runs-on:
      - self-hosted
      - Windows
      - X64

    defaults:
      run:
        shell: powershell

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    #################################################
    # Python
    #################################################

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    #################################################
    # Backend Tests
    #################################################

    - name: Install Backend Dependencies
      working-directory: backend
      run: |
        pip install -r requirements.txt

    - name: Run Pytest
      working-directory: backend
      run: |
        pytest

    #################################################
    # Docker Login
    #################################################

    - name: Docker Login
      run: |
        docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"

    #################################################
    # Build Backend
    #################################################

    - name: Build Backend Image
      run: |
        docker build -t $env:BACKEND_IMAGE:$env:IMAGE_TAG ./backend

    #################################################
    # Build Frontend
    #################################################

    - name: Build Frontend Image
      run: |
        docker build -t $env:FRONTEND_IMAGE:$env:IMAGE_TAG ./frontend

    #################################################
    # Push Backend
    #################################################

    - name: Push Backend Image
      run: |
        docker push $env:BACKEND_IMAGE:$env:IMAGE_TAG

    #################################################
    # Push Frontend
    #################################################

    - name: Push Frontend Image
      run: |
        docker push $env:FRONTEND_IMAGE:$env:IMAGE_TAG

    #################################################
    # Verify Kubernetes
    #################################################

    - name: Check Cluster
      run: |
        kubectl cluster-info
        kubectl get nodes

    #################################################
    # Helm Deployment
    #################################################

    - name: Helm Upgrade
      run: |
        helm upgrade --install automation ./automation-chart --namespace automation --create-namespace

    #################################################
    # Verify Deployment
    #################################################

    - name: Verify Pods
      run: |
        kubectl get pods -n automation

    #################################################
    # Verify Services
    #################################################

    - name: Verify Services
      run: |
        kubectl get svc -n automation

    #################################################
    # Verify Ingress
    #################################################

    - name: Verify Ingress
      run: |
        kubectl get ingress -n automation
