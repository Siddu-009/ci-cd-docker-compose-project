name: Runner Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on:
      - self-hosted
      - Windows
      - X64

    steps:
      - uses: actions/checkout@v4

      - name: Hello
        run: echo "Runner is working"

      - name: Show PATH
        run: echo $env:PATH

