name: Runner Test

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  test:
    runs-on:
      - self-hosted
      - Windows
      - X64

    steps:
      - uses: actions/checkout@v4

      - name: Hello
        run: echo "Runner is working"

      - name: Hostname
        run: hostname

      - name: WhoAmI
        run: whoami

      - name: Docker
        run: docker --version

      - name: Kubectl
        run: kubectl version --client

      - name: Helm
        run: helm version
