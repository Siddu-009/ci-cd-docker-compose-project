name: Kubernetes Deployment

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3

        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend

        run: |
          docker build -t siddu009/automation-backend:v1 ./backend

      - name: Build Frontend

        run: |
          docker build -t siddu009/automation-frontend:v1 ./frontend

      - name: Push Backend

        run: |
          docker push siddu009/automation-backend:v1

      - name: Push Frontend

        run: |
          docker push siddu009/automation-frontend:v1

      - name: Setup Kubectl

        uses: azure/setup-kubectl@v4

      - name: Configure Kubernetes

        run: |
          mkdir ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Deploy using Helm

        run: |
          helm upgrade --install automation automation-chart
